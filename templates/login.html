{% extends "base.html" %}
{% block title %}Unlock SecureVault{% endblock %}
{% block content %}
<section class="min-h-[80vh] flex items-center justify-center p-4">
    <div class="glass p-10 md:p-12 rounded-[3rem] w-full max-w-md shadow-2xl border-white/10 relative overflow-hidden animate-in zoom-in duration-500">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-purple-600/20 rounded-full blur-3xl"></div>

        <div class="text-center mb-10">
            <div class="w-20 h-20 rounded-[2rem] bg-blue-600 mx-auto flex items-center justify-center shadow-xl shadow-blue-500/20 mb-6">
                <i class="fa-solid fa-lock text-white text-3xl"></i>
            </div>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-2">Authenticated Entry</p>
            <h1 class="text-4xl font-black text-white tracking-tighter">Unlock <span class="text-gradient">Vault</span></h1>
        </div>

        <form class="space-y-6" method="post">
            {% if password_hint %}
            <div class="p-4 rounded-2xl bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs text-center italic">
                <span class="font-bold uppercase tracking-widest text-[9px] block mb-1 opacity-60">Master Hint</span>
                "{{ password_hint }}"
            </div>
            {% endif %}

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Master Password</label>
                <div class="relative group">
                    <i class="fa-solid fa-shield-keyhole absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="password" name="master_password" 
                           class="w-full pl-12 pr-4 py-4 bg-slate-950/50 border border-white/5 rounded-2xl text-white focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 transition-all placeholder:text-slate-700" 
                           placeholder="••••••••••••"
                           autocomplete="current-password" required autofocus>
                </div>
            </div>

            <button class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/20 transform active:scale-[0.98] transition-all duration-200 uppercase tracking-widest text-xs" type="submit">
                DECRYPT & OPEN
            </button>

            <div class="pt-6 text-center border-t border-white/5 space-y-6">
                <a class="text-xs font-bold text-slate-500 hover:text-white transition-colors block" href="{{ url_for('recover') }}">
                    <i class="fa-solid fa-life-ring mr-1"></i> Forgot Password? Use Recovery Phrase
                </a>
                <div class="flex flex-col items-center gap-3">
                    <div class="flex items-center gap-3">
                        <img src="https://github.com/manoranjan2050.png" class="w-8 h-8 rounded-full border border-blue-500/50" alt="Manoranjan">
                        <div class="text-left">
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest leading-none">Developed by</p>
                            <a href="https://github.com/manoranjan2050" target="_blank" class="text-sm font-bold text-white hover:text-blue-400 transition-colors">Manoranjan</a>
                        </div>
                    </div>
                    <a href="https://manoranjan.dev" target="_blank" class="text-[10px] font-bold text-blue-500 hover:underline tracking-widest uppercase">manoranjan.dev</a>
                </div>
            </div>
        </form>
    </div>
</section>
{% endblock %}

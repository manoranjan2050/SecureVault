{% extends "base.html" %}
{% block title %}Manage Secret - SecureVault{% endblock %}
{% block heading %}{{ "Update Existing Secret" if entry else "Register New Secret" }}{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto animate-in zoom-in duration-300">
    <div class="glass p-8 md:p-10 rounded-[3rem] border-white/5 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/10 rounded-full blur-3xl"></div>

        <form class="space-y-6" method="post">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Title -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 text-blue-400">Password Name</label>
                    <input name="title" value="{{ entry.title if entry else '' }}" required autofocus
                           class="w-full px-5 py-4 bg-slate-950/50 border border-white/5 rounded-2xl text-white focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 transition-all placeholder:text-slate-700"
                           placeholder="e.g. Google Main Account">
                </div>
                <!-- Website -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Website URL</label>
                    <input name="website" value="{{ entry.website if entry else '' }}" type="url"
                           class="w-full px-5 py-4 bg-slate-950/50 border border-white/5 rounded-2xl text-white focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 transition-all placeholder:text-slate-700"
                           placeholder="https://accounts.google.com">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Username -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Username</label>
                    <input name="username" value="{{ entry.username if entry else '' }}"
                           class="w-full px-4 py-3 bg-slate-950/50 border border-white/5 rounded-2xl text-white text-sm focus:outline-none focus:border-blue-500/50 transition-all placeholder:text-slate-800"
                           placeholder="manoranjan">
                </div>
                <!-- Email -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Email ID</label>
                    <input name="email_id" value="{{ entry.email_id if entry else '' }}" type="email"
                           class="w-full px-4 py-3 bg-slate-950/50 border border-white/5 rounded-2xl text-white text-sm focus:outline-none focus:border-blue-500/50 transition-all placeholder:text-slate-800"
                           placeholder="user@example.com">
                </div>
                <!-- Mobile -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Mobile No</label>
                    <input name="mobile_no" value="{{ entry.mobile_no if entry else '' }}" type="tel"
                           class="w-full px-4 py-3 bg-slate-950/50 border border-white/5 rounded-2xl text-white text-sm focus:outline-none focus:border-blue-500/50 transition-all placeholder:text-slate-800"
                           placeholder="+91 0000000000">
                </div>
            </div>

            <!-- Password & Confirm -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 text-green-400">Password</label>
                    <div class="flex gap-2">
                        <div class="relative flex-1 group">
                            <input id="passwordField" name="password" type="text" value="{{ entry.password if entry else '' }}" required data-strength-input
                                   class="w-full px-5 py-4 bg-slate-950/50 border border-white/10 rounded-2xl text-white font-mono focus:outline-none focus:border-green-500/50 focus:ring-4 focus:ring-green-500/10 transition-all">
                        </div>
                        <button class="px-4 py-4 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl text-[10px] font-black tracking-widest transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2" 
                                type="button" data-generate-password>
                            <i class="fa-solid fa-wand-magic-sparkles"></i>
                        </button>
                    </div>
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Confirm Password</label>
                    <input name="confirm_password" type="password" value="{{ entry.password if entry else '' }}" required
                           class="w-full px-5 py-4 bg-slate-950/50 border border-white/5 rounded-2xl text-white focus:outline-none focus:border-blue-500/50 transition-all placeholder:text-slate-800"
                           placeholder="••••••••••••">
                </div>
            </div>
            
            <!-- Strength Meter -->
            <div class="space-y-2">
                <div class="h-1.5 w-full bg-slate-900 rounded-full overflow-hidden" data-strength-meter>
                    <div class="h-full bg-slate-700 transition-all duration-500 w-0"></div>
                </div>
                <div class="flex justify-between items-center px-1">
                    <small class="text-[10px] font-bold text-slate-500 uppercase tracking-tighter" data-strength-label>Entropy Check</small>
                    <i class="fa-solid fa-shield-check text-slate-700" data-strength-icon></i>
                </div>
            </div>

            <!-- Tags -->
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Classification Tags</label>
                <input name="tags" value="{{ entry.tags if entry else '' }}"
                       class="w-full px-5 py-4 bg-slate-950/50 border border-white/5 rounded-2xl text-white focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 transition-all placeholder:text-slate-700"
                       placeholder="e.g. Work, Financial, Hosting">
            </div>

            <!-- Notes -->
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Notes</label>
                <textarea name="notes" rows="4"
                          class="w-full px-5 py-4 bg-slate-950/50 border border-white/5 rounded-2xl text-white focus:outline-none focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 transition-all placeholder:text-slate-700"
                          placeholder="Security questions, recovery codes, or important reminders...">{{ entry.notes if entry else '' }}</textarea>
            </div>

            <div class="flex flex-col md:flex-row gap-4 pt-8 border-t border-white/5">
                <button class="flex-1 py-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl shadow-xl shadow-blue-500/20 transition-all transform active:scale-[0.98] uppercase tracking-[0.2em] text-xs" type="submit">
                    <i class="fa-solid fa-shield-lock mr-2"></i> SEAL SECURELY
                </button>
                <a class="flex-1 py-4 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white font-black rounded-2xl text-center transition-all uppercase tracking-[0.2em] text-xs border border-white/5" 
                   href="{{ url_for('passwords') }}">
                    DISCARD
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

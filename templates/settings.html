{% extends "base.html" %}
{% block title %}Security Settings - SecureVault{% endblock %}
{% block heading %}Vault Configuration{% endblock %}
{% block content %}
<div class="space-y-10 animate-in fade-in duration-500">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
        <!-- Vault Settings -->
        <article class="glass p-8 md:p-10 rounded-[3rem] border-white/5 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/5 rounded-full blur-3xl"></div>
            
            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 rounded-2xl bg-blue-600/10 flex items-center justify-center text-blue-500">
                    <i class="fa-solid fa-sliders text-xl"></i>
                </div>
                <h3 class="text-xl font-black text-white italic tracking-tight">System Parameters</h3>
            </div>

            <form class="space-y-6" method="post">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Authentication Hint</label>
                    <input name="password_hint" value="{{ password_hint }}" placeholder="Non-sensitive clue only"
                           class="w-full px-5 py-4 bg-slate-950/50 border border-white/5 rounded-2xl text-white focus:outline-none focus:border-blue-500/50 transition-all">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Auto-Lock Protocol</label>
                    <select name="session_timeout_seconds" class="w-full px-5 py-4 bg-slate-950/50 border border-white/5 rounded-2xl text-white focus:outline-none focus:border-blue-500/50 transition-all appearance-none cursor-pointer">
                        <option value="300" {% if session_timeout_seconds == '300' %}selected{% endif %}>5 Minutes (Maximum Security)</option>
                        <option value="900" {% if session_timeout_seconds == '900' %}selected{% endif %}>15 Minutes</option>
                        <option value="1800" {% if session_timeout_seconds == '1800' %}selected{% endif %}>30 Minutes</option>
                        <option value="3600" {% if session_timeout_seconds == '3600' %}selected{% endif %}>1 Hour (Portable Mode)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Primary Backup Target</label>
                    <input name="backup_location" value="{{ backup_location }}" placeholder="D:\SecureVaultBackups"
                           class="w-full px-5 py-4 bg-slate-950/50 border border-white/5 rounded-2xl text-white focus:outline-none focus:border-blue-500/50 transition-all">
                </div>

                <label class="flex items-center gap-4 px-5 py-4 bg-white/5 border border-white/5 rounded-2xl cursor-pointer group hover:border-blue-500/30 transition-all">
                    <input type="checkbox" name="auto_backup_enabled" {% if auto_backup_enabled %}checked{% endif %} class="w-5 h-5 accent-blue-600 rounded-md">
                    <span class="text-xs font-bold text-slate-400 group-hover:text-white transition-colors uppercase tracking-widest">Enable Daily Auto-Backups</span>
                </label>

                <label class="flex items-center gap-4 px-5 py-4 bg-white/5 border border-white/5 rounded-2xl cursor-pointer group hover:border-blue-500/30 transition-all">
                    <input type="checkbox" name="lock_on_blur" {% if lock_on_blur %}checked{% endif %} class="w-5 h-5 accent-blue-600 rounded-md">
                    <div class="flex-1">
                        <span class="text-xs font-bold text-slate-400 group-hover:text-white transition-colors uppercase tracking-widest block">Privacy Shield</span>
                        <span class="text-[8px] text-slate-600 uppercase font-bold">Lock vault when switching tabs</span>
                    </div>
                </label>

                <button class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-[2rem] shadow-xl shadow-blue-500/20 transition-all transform active:scale-95 uppercase tracking-[0.2em] text-xs" type="submit">
                    COMMIT SETTINGS
                </button>
            </form>
        </article>

        <!-- Recovery and Continuity -->
        <article class="space-y-8">
            <div class="glass p-8 md:p-10 rounded-[3rem] border-white/5 relative overflow-hidden">
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-12 h-12 rounded-2xl bg-purple-600/10 flex items-center justify-center text-purple-500">
                        <i class="fa-solid fa-shield-heart text-xl"></i>
                    </div>
                    <h3 class="text-xl font-black text-white italic tracking-tight">Recovery Protocols</h3>
                </div>

                <div class="space-y-4">
                    <a href="{{ url_for('change_master_password') }}" class="flex items-center justify-between p-5 bg-white/5 hover:bg-white/10 border border-white/5 rounded-2xl transition-all group">
                        <span class="text-sm font-bold text-slate-300">Rotate Master Password</span>
                        <i class="fa-solid fa-chevron-right text-slate-700 group-hover:text-white transition-colors"></i>
                    </a>
                    <form method="post" action="{{ url_for('generate_recovery_kit') }}" class="contents">
                        <button class="w-full flex items-center justify-between p-5 bg-white/5 hover:bg-white/10 border border-white/5 rounded-2xl transition-all group" type="submit">
                            <span class="text-sm font-bold text-slate-300">Re-generate Recovery Kit</span>
                            <i class="fa-solid fa-print text-slate-700 group-hover:text-white transition-colors"></i>
                        </button>
                    </form>
                    <a href="{{ url_for('backup') }}" class="flex items-center justify-between p-5 bg-purple-600/10 hover:bg-purple-600/20 border border-purple-500/20 rounded-2xl transition-all group">
                        <span class="text-sm font-black text-purple-400">Manual .SVAULT Export</span>
                        <i class="fa-solid fa-cloud-arrow-up text-purple-500"></i>
                    </a>
                </div>
            </div>

            <div class="glass p-8 md:p-10 rounded-[3rem] border-red-500/10 bg-red-500/5 relative overflow-hidden">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-10 h-10 rounded-xl bg-red-600/10 flex items-center justify-center text-red-500">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                    <h3 class="text-lg font-black text-white tracking-tight uppercase">Emergency Restore</h3>
                </div>
                <form method="post" action="{{ url_for('restore_backup') }}" enctype="multipart/form-data" data-confirm="CRITICAL: This will overwrite ALL current vault data. Proceed?" class="space-y-4">
                    <div class="relative group">
                        <input type="file" name="backup_file" accept=".svault" required 
                               class="w-full text-xs text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-[10px] file:font-black file:bg-red-600/10 file:text-red-500 hover:file:bg-red-600/20 cursor-pointer">
                    </div>
                    <button class="w-full py-4 bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white rounded-xl text-[10px] font-black uppercase tracking-widest transition border border-red-500/20" type="submit">
                        INITIATE SYSTEM RESTORE
                    </button>
                </form>
            </div>
        </article>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Manage Note - SecureVault{% endblock %}
{% block heading %}{{ "Refine Encrypted Note" if entry else "Compose New Note" }}{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto animate-in zoom-in duration-300">
    <div class="glass p-8 md:p-12 rounded-[3.5rem] border-white/5 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-pink-600/10 rounded-full blur-3xl"></div>

        <form class="space-y-8" method="post">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Title -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1 text-pink-400">Note Title</label>
                    <input name="title" value="{{ entry.title if entry else '' }}" required autofocus
                           class="w-full px-6 py-4 bg-slate-950/50 border border-white/5 rounded-2xl text-white focus:outline-none focus:border-pink-500/50 focus:ring-4 focus:ring-pink-500/10 transition-all placeholder:text-slate-800"
                           placeholder="e.g. Master API Keys">
                </div>
                <!-- Category -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1">Contextual Segment</label>
                    <input name="category" value="{{ entry.category if entry else '' }}"
                           class="w-full px-6 py-4 bg-slate-950/50 border border-white/5 rounded-2xl text-white focus:outline-none focus:border-pink-500/50 focus:ring-4 focus:ring-pink-500/10 transition-all placeholder:text-slate-800"
                           placeholder="Personal, Work, Recovery...">
                </div>
            </div>

            <!-- Content -->
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1">Encrypted Payload</label>
                <textarea name="content" rows="12" required
                          class="w-full px-8 py-6 bg-slate-950/50 border border-white/5 rounded-[2.5rem] text-white font-mono text-sm leading-relaxed focus:outline-none focus:border-pink-500/50 focus:ring-4 focus:ring-pink-500/10 transition-all placeholder:text-slate-800 scrollbar-hide"
                          placeholder="Paste your sensitive data here. It will be encrypted before reaching the database...">{{ entry.content if entry else '' }}</textarea>
            </div>

            <div class="flex flex-col md:flex-row gap-4 pt-10 border-t border-white/5">
                <button class="flex-1 py-5 bg-pink-600 hover:bg-pink-500 text-white font-black rounded-[2.5rem] shadow-2xl shadow-pink-500/20 transition-all transform active:scale-[0.98] uppercase tracking-[0.3em] text-xs" type="submit">
                    <i class="fa-solid fa-shield-halved mr-2 text-sm"></i> ENCRYPT & SEAL
                </button>
                <a class="flex-1 py-5 bg-slate-900/50 hover:bg-slate-800 text-slate-400 hover:text-white font-black rounded-[2.5rem] text-center transition-all uppercase tracking-[0.3em] text-xs border border-white/5" 
                   href="{{ url_for('notes') }}">
                    DISCARD DRAFT
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Expired - SecureVault{% endblock %}
{% block content %}
<section class="min-h-[80vh] flex items-center justify-center p-4">
    <div class="glass p-8 md:p-12 rounded-[3.5rem] w-full max-w-xl shadow-2xl border-white/10 relative overflow-hidden animate-in zoom-in duration-500 text-center">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-red-600/10 rounded-full blur-3xl"></div>
        
        <div class="w-20 h-20 rounded-2xl bg-red-600/10 border border-red-500/20 mx-auto flex items-center justify-center text-red-500 text-3xl mb-8">
            <i class="fa-solid fa-ghost"></i>
        </div>
        <h1 class="text-3xl font-black text-white tracking-tighter mb-4 italic">Message Expired</h1>
        <p class="text-slate-400 text-sm mb-10 max-w-sm mx-auto uppercase tracking-widest font-bold leading-relaxed">
            This ephemeral message has been <span class="text-red-500">purged</span> from the system. It may have been read or exceeded its 60-minute lifespan.
        </p>
        <a href="https://manoranjan.dev" class="px-10 py-4 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-xs font-black tracking-widest transition">
            RETURN TO HUB
        </a>
    </div>
</section>
{% endblock %}

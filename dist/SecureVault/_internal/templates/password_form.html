{% extends "base.html" %}
{% block title %}Password - SecureVault{% endblock %}
{% block heading %}{{ "Edit Password" if entry else "Add Password" }}{% endblock %}
{% block content %}
<form class="form-panel" method="post">
    <label>Title<input name="title" value="{{ entry.title if entry else '' }}" required autofocus></label>
    <label>Website<input name="website" value="{{ entry.website if entry else '' }}" placeholder="https://example.com"></label>
    <label>Username<input name="username" value="{{ entry.username if entry else '' }}"></label>
    <label>
        Password
        <div class="inline-field">
            <input id="passwordField" name="password" type="text" value="{{ entry.password if entry else '' }}" required data-strength-input>
            <button class="button ghost" type="button" data-generate-password>Generate</button>
        </div>
        <div class="strength-meter" data-strength-meter><span></span></div>
        <small class="muted" data-strength-label>Password strength will appear here.</small>
    </label>
    <label>Tags<input name="tags" value="{{ entry.tags if entry else '' }}" placeholder="Banking, Social, Hosting"></label>
    <label>Notes<textarea name="notes" rows="5">{{ entry.notes if entry else '' }}</textarea></label>
    <div class="form-actions">
        <button class="button primary" type="submit">Save Securely</button>
        <a class="button ghost" href="{{ url_for('passwords') }}">Cancel</a>
    </div>
</form>
{% endblock %}

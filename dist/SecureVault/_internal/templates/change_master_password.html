{% extends "base.html" %}
{% block title %}Change Master Password - SecureVault{% endblock %}
{% block heading %}Change Master Password{% endblock %}
{% block content %}
<form class="form-panel" method="post">
    <p class="muted">This re-encrypts your passwords, notes, records, and documents with a new AES-256 key.</p>
    <label>Current master password<input type="password" name="current_password" required autofocus></label>
    <label>New master password<input type="password" name="new_password" minlength="10" required></label>
    <label>Confirm new password<input type="password" name="confirm_password" minlength="10" required></label>
    <div class="form-actions">
        <button class="button primary" type="submit">Change Password</button>
        <a class="button ghost" href="{{ url_for('settings') }}">Cancel</a>
    </div>
</form>
{% endblock %}
